train:
  model: informer
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  use_focal_loss: false
  focal_gamma: 2.0
  focal_alpha: null
  oversample: false
  oversample_ratio: 1.0
  features: ["temp"]
  val_ratio: 0.1
  seed: 42

model_kwargs:
  d_model: 32
  num_layers: 1
  n_heads: 4
  d_ff: 64
  max_len: 60
  dropout: 0.1
  sampling_factor: 5
