train:
  model: cnn1d
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  use_focal_loss: false
  focal_gamma: 2.0
  focal_alpha: null
  oversample: false
  oversample_ratio: 1.0
  features: ["temp"]
  val_ratio: 0.1
  seed: 42

model_kwargs:
  num_channels: 64
  num_blocks: 4
  kernel_size: 3
  dropout: 0.2
  dilation_base: 2
